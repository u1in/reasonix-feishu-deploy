# ═══════════════════════════════════════════════════════════════════════════
# Reasonix 飞书 Bot 配置（最小化）
# Bot 部署专用，只含必需设置。用户自有配置会在安装时从 ~/.reasonix/config.toml 合并。
# ═══════════════════════════════════════════════════════════════════════════

config_version = 3
default_model = "deepseek-flash"
language      = "zh"

# ── AI 模型提供商 ──

[[providers]]

name        = "deepseek-flash"
kind        = "openai"
base_url    = "https://api.deepseek.com"
models      = ["deepseek-v4-flash"]
default     = "deepseek-v4-flash"
api_key_env = "DEEPSEEK_API_KEY"
context_window = 1000000
price       = { cache_hit = 0.02, input = 1, output = 2, currency = "¥" }

# ── Agent 行为 ──

[agent]

temperature       = 0.0
auto_plan         = "off"
memory_compiler   = { enabled = false }

# ── 工具设置 ──

[tools]

enabled = []
bash_timeout_seconds = 120
mcp_call_timeout_seconds = 300

[tools.background_jobs]

stalled_warning_seconds = 900

# ── 沙箱（安全隔离） ──

[sandbox]

bash    = "off"
network = true

# ═══════════════════════════════════════════════════════════════════════════
# Bot 网关
# ═══════════════════════════════════════════════════════════════════════════

[bot]

enabled = true
tool_approval_mode = "yolo"
max_steps = 40
debounce_ms = 3000

[bot.allowlist]

enabled = true
allow_all = true
qq_users = []
feishu_users = ["ou_xxxxxxxxxxxxxxxxxxxxxxxxxxxxx"]
weixin_users = []
qq_groups = []
feishu_groups = []
weixin_groups = []

[bot.qq]
enabled = true
app_id = "your-qq-app-id"
app_secret_env = "QQ_BOT_APP_SECRET"
sandbox = false

[bot.feishu]

enabled = true
app_id = "your-feishu-app-id"
domain = "feishu"
app_secret_env = "FEISHU_BOT_APP_SECRET"
verification_token = ""
mode = "websocket"
webhook_port = 8080
require_mention = false

[bot.weixin]
enabled = true
account_id = "default"
token_env = "WEIXIN_BOT_TOKEN"
api_base = "https://ilinkai.weixin.qq.com"
